<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tài khoản — PCBuilder</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-page="account">
  <div id="header-placeholder"></div>

  <main>
    <div class="page-shell">

      <!-- Page hero -->
      <div class="page-hero diag-band">
        <div class="hero-eyebrow">Tài khoản</div>
        <h1>Quản lý <em>build &amp; đánh giá</em></h1>
        <p>Xem và chỉnh sửa cấu hình đã lưu và các nhận xét của bạn</p>
      </div>

      <!-- Guest state -->
      <div id="accountGuest" style="display:none">
        <div class="empty" style="padding:80px 24px">
          <div class="empty-icon">🔒</div>
          <span style="font-size:16px;font-weight:700;color:var(--navy)">Bạn chưa đăng nhập</span>
          <span style="font-size:14px;color:var(--text-3)">Đăng nhập để xem build và review của bạn</span>
          <a href="../pages/auth.html" class="btn primary" style="margin-top:16px">Đăng nhập ngay</a>
        </div>
      </div>

      <!-- Logged-in state -->
      <div id="accountContent" style="display:none">

        <!-- Profile card -->
        <div class="account-header-card">
          <div class="account-avatar" id="accountAvatarInitial">?</div>
          <div style="flex:1">
            <div class="account-name" id="accountName">—</div>
            <div class="account-email" id="accountEmailDisplay">—</div>
          </div>
          <span class="badge badge-ice" id="accountRoleBadge" style="font-size:12px">USER</span>
        </div>

        <!-- Tabs -->
        <div class="account-tabs">
          <button class="account-tab active" data-tab="builds" type="button">🔧 Builds của tôi</button>
          <button class="account-tab" data-tab="reviews" type="button">⭐ Đánh giá của tôi</button>
        </div>

        <!-- Builds tab -->
        <div id="tabBuilds">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
            <span style="font-size:14px;color:var(--text-3)" id="buildsCountLabel"></span>
            <button id="saveWorkspaceBuildBtn" class="btn outline btn-sm">💾 Lưu build từ Workspace</button>
          </div>
          <div id="savedBuilds" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
            <div class="skeleton-card" style="min-height:140px"></div>
            <div class="skeleton-card" style="min-height:140px"></div>
          </div>
        </div>

        <!-- Reviews tab -->
        <div id="tabReviews" style="display:none">
          <div style="margin-bottom:16px">
            <span style="font-size:14px;color:var(--text-3)" id="reviewsCountLabel"></span>
          </div>
          <div id="myReviews" class="stack"></div>
        </div>

      </div>

    </div>
  </main>

  <!-- Confirm modal -->
  <div id="confirmModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:380px">
      <div style="margin-bottom:16px">
        <div class="modal-title" id="confirmModalTitle">Xác nhận xóa</div>
      </div>
      <p style="font-size:14px;color:var(--text-3)" id="confirmModalBody"></p>
      <div class="modal-footer">
        <button class="btn outline" id="cancelConfirm">Hủy</button>
        <button class="btn crimson" id="okConfirm">Xóa</button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>

  <style>
    .account-tab-content { display: none; }
    .account-tab-content.active { display: block; }
  </style>

  <script>
    // Account tabs
    document.querySelectorAll('.account-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.account-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        document.getElementById('tabBuilds').style.display  = target === 'builds'  ? 'block' : 'none';
        document.getElementById('tabReviews').style.display = target === 'reviews' ? 'block' : 'none';
      });
    });
  </script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
