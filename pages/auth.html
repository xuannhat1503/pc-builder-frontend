<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — PCBuilder</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-page="auth">
  <div id="header-placeholder"></div>

  <main>
    <div class="auth-page-wrap">
      <div class="auth-box">

        <!-- Logo -->
        <div class="auth-logo">
          <div class="auth-logo-mark">⚡</div>
          <h2>PCBuilder</h2>
          <p>Tư vấn cấu hình máy tính thông minh</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-auth="login" type="button">Đăng nhập</button>
          <button class="auth-tab" data-auth="register" type="button">Tạo tài khoản</button>
        </div>

        <!-- Login panel -->
        <div class="auth-panel active" id="loginPanel">
          <label>
            Email
            <input id="loginEmail" type="email" placeholder="you@example.com" />
          </label>
          <label>
            Mật khẩu
            <input id="loginPassword" type="password" placeholder="••••••••" />
          </label>
          <button id="loginBtn" class="btn primary w-full" style="justify-content:center;margin-top:4px">
            Đăng nhập
          </button>
        </div>

        <!-- Register panel -->
        <div class="auth-panel" id="registerPanel">
          <label>
            Email
            <input id="registerEmail" type="email" placeholder="you@example.com" />
          </label>
          <label>
            Mật khẩu
            <input id="registerPassword" type="password" placeholder="Tối thiểu 6 ký tự" />
          </label>
          <label>
            Xác nhận mật khẩu
            <input id="registerPasswordConfirm" type="password" placeholder="Nhập lại mật khẩu" />
          </label>
          <p style="font-size:12px;color:var(--text-3);line-height:1.6">
            Tài khoản mới sẽ có vai trò <span class="badge badge-gray">USER</span>.
            Liên hệ quản trị viên để nâng cấp ADMIN.
          </p>
          <button id="registerBtn" class="btn primary w-full" style="justify-content:center">
            Tạo tài khoản
          </button>
        </div>

        <!-- Message -->
        <div id="authMessage" class="auth-message"></div>

      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>

  <script>
    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.auth + 'Panel').classList.add('active');
      });
    });
  </script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
